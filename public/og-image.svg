<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#34d399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Icono en bloque cuadrado -->
  <rect x="80" y="80" width="96" height="96" rx="16" fill="#ffffff"/>
  <path d="M 96 128 H 120 L 128 104 L 144 152 L 156 118 L 168 136 L 184 136"
        stroke="#059669" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Pulse line decorativo -->
  <path d="M 0 260 H 200 L 230 230 L 260 290 L 290 240 L 320 260 H 1200"
        stroke="url(#pulse)" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Marca -->
  <text x="80" y="300" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="800">Pulso Desk</text>
  <text x="80" y="350" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500">Gestión de soporte, solicitudes y desarrollo</text>

  <!-- Features -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#d1fae5">
    <rect x="80"  y="420" width="200" height="56" rx="8" fill="#ffffff" fill-opacity="0.15"/>
    <text x="180" y="456" text-anchor="middle" fill="#ffffff" font-weight="600">🎫 Tickets</text>

    <rect x="300" y="420" width="240" height="56" rx="8" fill="#ffffff" fill-opacity="0.15"/>
    <text x="420" y="456" text-anchor="middle" fill="#ffffff" font-weight="600">💡 Solicitudes</text>

    <rect x="560" y="420" width="240" height="56" rx="8" fill="#ffffff" fill-opacity="0.15"/>
    <text x="680" y="456" text-anchor="middle" fill="#ffffff" font-weight="600">📋 Órdenes</text>

    <rect x="820" y="420" width="240" height="56" rx="8" fill="#ffffff" fill-opacity="0.15"/>
    <text x="940" y="456" text-anchor="middle" fill="#ffffff" font-weight="600">🏢 Clientes</text>
  </g>

  <!-- URL al pie -->
  <text x="80" y="575" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">pulso-desk.pages.dev</text>

  <!-- Logo NODO al pie derecho -->
  <text x="1120" y="575" text-anchor="end" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">de NODO</text>
</svg>
